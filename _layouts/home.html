---
layout: default
---

<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<!-- Top Section: 3 columns with image links -->
<section class="top-section">
  <div class="image-grid">

    <div class="image-item">
      <a href="{{ site.data.currently.listening.url }}" class="image-link">
        <div class="image-frame">
          <img src="{{ site.data.currently.listening.image }}" alt="{{ site.data.currently.listening.title }}">
        </div>
        <span class="image-label">currently listening</span>
      </a>
    </div>

    <div class="image-item">
      <a href="{{ site.data.currently.reading.url }}" class="image-link">
        <div class="image-frame">
          <img src="{{ site.data.currently.reading.image }}" alt="{{ site.data.currently.reading.title }}">
        </div>
        <span class="image-label">currently reading</span>
      </a>
    </div>

    <div class="image-item">
      <a href="{{ site.data.currently.spotlight.url }}" class="image-link">
        <div class="image-frame">
          <img src="{{ site.data.currently.spotlight.image }}" alt="{{ site.data.currently.spotlight.title }}">
        </div>
        <span class="image-label">currently → project spotlight</span>
      </a>
    </div>

  </div>
</section>

<!-- Bottom Section: 2 columns rendered from page content -->
<section class="bottom-section">
  <div class="card-grid">
    {{ content }}
  </div>
</section>
